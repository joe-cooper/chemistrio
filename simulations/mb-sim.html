<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maxwell–Boltzmann Emergence</title>
<link rel="stylesheet" href="../assets/css/theme.css">
<script src="../assets/js/theme.js"></script>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font);
    -webkit-font-smoothing:antialiased;
    padding:16px;
  }
  .wrap{max-width:1180px;margin:0 auto;}

  /* ---------- main layout ---------- */
  .stage{
    display:grid;
    grid-template-columns:minmax(0,1fr) minmax(0,1.18fr);
    gap:14px;
    margin-bottom:14px;
  }
  @media(max-width:860px){.stage{grid-template-columns:1fr;}}

  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:6px;
    padding:12px;
    position:relative;
  }
  .card-label{
    font-size:13px;font-weight:600;
    color:var(--muted);
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:10px;
  }
  .card-label .right{color:var(--muted-dim);font-weight:400;font-size:12px;}
  .toggles{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .curve-toggle{
    font-family:var(--font);font-size:12px;
    background:transparent;border:0;cursor:pointer;padding:2px 0;
    color:var(--gold-dim);display:inline-flex;align-items:center;gap:7px;
    transition:color .15s;
  }
  .curve-toggle .swatch{
    width:16px;height:2px;border-radius:1px;background:var(--gold);
    transition:opacity .15s,background .15s;
  }
  .curve-toggle:hover{color:var(--gold);}
  .curve-toggle[aria-pressed="false"]{color:var(--muted-dim);}
  .curve-toggle[aria-pressed="false"] .swatch{background:var(--muted-dim);box-shadow:none;opacity:.5;}
  .curve-toggle:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px;}
  /* empirical toggle: dotted-data swatch + neutral colour, reads as
     "measured data" rather than "theoretical" (gold) */
  #empToggle{color:#9fb0bf;}
  #empToggle:hover{color:#e9eff5;}
  .curve-toggle .swatch.dots{
    width:16px;height:6px;border-radius:0;background:transparent;box-shadow:none;
    background-image:radial-gradient(circle,#e9eff5 1.3px,transparent 1.6px);
    background-size:5.3px 6px;background-position:center;
  }
  #empToggle[aria-pressed="false"]{color:var(--muted-dim);}
  #empToggle[aria-pressed="false"] .swatch.dots{opacity:.4;background-image:radial-gradient(circle,var(--muted-dim) 1.3px,transparent 1.6px);}
  #empToggle:focus-visible{outline:2px solid #9fb0bf;outline-offset:3px;border-radius:2px;}
  /* activation-energy toggle: solid vertical-bar swatch in the accent
     colour, reads as "adjustable threshold" rather than a passive stat */
  #actToggle{color:var(--accent);}
  #actToggle:hover{color:var(--gold);}
  .curve-toggle .swatch.bar{
    width:2px;height:14px;border-radius:1px;background:var(--accent);
  }
  #actToggle[aria-pressed="false"]{color:var(--muted-dim);}
  #actToggle[aria-pressed="false"] .swatch.bar{background:var(--muted-dim);opacity:.5;}
  #actToggle:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px;}
  #actToggle .pct{font-variant-numeric:tabular-nums;}

  canvas{display:block;width:100%;height:auto;border-radius:3px;}
  #box{background:#05070c;}
  #hist{height:100%;}

  /* ---------- readout column ---------- */
  .readout{display:flex;flex-direction:column;}
  .hist-wrap{flex:1;min-height:0;}

  .stats{
    display:grid;grid-template-columns:repeat(5,1fr);
    gap:1px;background:var(--border-soft);
    border:1px solid var(--border-soft);border-radius:4px;overflow:hidden;
    margin-top:10px;
  }
  .stat{background:var(--raised);padding:8px 10px;}
  .stat .k{
    font-size:11.5px;color:var(--muted-dim);
    display:block;margin-bottom:4px;
  }
  .stat .v{
    font-variant-numeric:tabular-nums;
    font-size:17px;font-weight:600;
    color:var(--text);line-height:1;
  }
  .stat .v small{font-size:10px;color:var(--muted);font-weight:400;margin-left:2px;}
  .stat.accent .v{color:var(--accent);}
  @media(max-width:520px){.stats{grid-template-columns:repeat(2,1fr);}}

  /* ---------- controls ---------- */
  .controls{
    background:var(--surface);border:1px solid var(--border);border-radius:6px;
    padding:14px 16px;
    display:grid;
    grid-template-columns:auto auto 1fr 1fr auto;
    gap:18px 22px;align-items:center;
  }
  @media(max-width:860px){
    .controls{grid-template-columns:1fr 1fr;gap:14px;}
    .ctl-run{grid-column:1 / -1;}
  }
  @media(max-width:460px){.controls{grid-template-columns:1fr;}}

  .ctl-label{
    font-size:12px;font-weight:600;color:var(--muted-dim);
    margin-bottom:8px;display:block;
  }

  /* mode buttons */
  .mode-btns{display:flex;gap:8px;flex-wrap:wrap;}
  .mode-btns button{
    font-family:var(--font);font-size:13px;font-weight:500;
    background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:4px;
    padding:7px 13px;cursor:pointer;
    transition:background .15s,border-color .15s,color .15s;white-space:nowrap;
  }
  .mode-btns button[aria-pressed="true"]{background:var(--accent);color:#0d1117;border-color:var(--accent);font-weight:500;}
  .mode-btns button:hover:not([aria-pressed="true"]){color:var(--text);border-color:var(--muted-dim);}

  /* sliders */
  .slider-row{display:flex;flex-direction:column;}
  .slider-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .slider-head .ctl-label{margin:0;}
  .slider-head .val{font-variant-numeric:tabular-nums;font-size:13px;font-weight:500;color:var(--text);}
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:100%;height:3px;
    background:var(--border);border-radius:2px;outline:none;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;
    background:var(--text);border:2px solid var(--surface);
    box-shadow:0 0 0 1px var(--border);cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{
    width:14px;height:14px;border-radius:50%;background:var(--text);
    border:2px solid var(--surface);box-shadow:0 0 0 1px var(--border);cursor:pointer;
  }
  input[type=range]:focus-visible::-webkit-slider-thumb{box-shadow:0 0 0 2px var(--accent);}
  input[type=range]:disabled{opacity:.4;cursor:not-allowed;}

  .ctl-run{display:flex;gap:10px;align-items:flex-end;height:100%;}
  .btn{
    font-family:var(--font);font-size:13.5px;font-weight:600;
    cursor:pointer;border-radius:4px;
    padding:9px 16px;transition:background .15s,border-color .15s,color .15s;
  }
  .btn-run{background:var(--accent);color:#0d1117;border:1px solid var(--accent);min-width:100px;}
  .btn-run:hover{background:var(--gold);}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .btn-ghost:hover{color:var(--text);border-color:var(--muted-dim);}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

</style>
</head>
<body>
<div class="wrap">

  <div class="stage">
    <!-- particle box -->
    <div class="card">
      <div class="card-label">
        <span>Particle field — speed → colour</span>
        <span class="right" id="phaseLabel">ready</span>
      </div>
      <canvas id="box" width="900" height="900" aria-label="Particle simulation box"></canvas>
    </div>

    <!-- histogram + stats -->
    <div class="card readout">
      <div class="card-label">
        <span>Speed distribution</span>
        <div class="toggles">
          <button class="curve-toggle" id="empToggle" aria-pressed="false">
            <span class="swatch dots"></span>empirical average
          </button>
          <button class="curve-toggle" id="curveToggle" aria-pressed="false">
            <span class="swatch"></span>equilibrium curve (2D)
          </button>
          <button class="curve-toggle" id="actToggle" aria-pressed="false">
            <span class="swatch bar"></span>activation energy<span class="pct" id="actPctLabel"></span>
          </button>
        </div>
      </div>
      <div class="hist-wrap">
        <canvas id="hist" width="1100" height="640" aria-label="Live histogram of particle speeds with Maxwell-Boltzmann curve"></canvas>
      </div>
      <div class="stats">
        <div class="stat"><span class="k">Mean speed</span><span class="v" id="sMean">—</span></div>
        <div class="stat"><span class="k">RMS speed</span><span class="v" id="sRms">—</span></div>
        <div class="stat accent"><span class="k">Most probable</span><span class="v" id="sVp">—</span></div>
        <div class="stat"><span class="k">Collisions</span><span class="v" id="sColl">0</span></div>
        <div class="stat accent"><span class="k">Above Eₐ</span><span class="v" id="sAct">—</span></div>
      </div>
    </div>
  </div>

  <!-- controls -->
  <div class="controls">
    <div>
      <span class="ctl-label">Start condition</span>
      <div class="mode-btns" role="group" aria-label="Starting condition">
        <button id="modeSingle" aria-pressed="true">Single speed</button>
        <button id="modeUniform" aria-pressed="false">Uniform spread</button>
      </div>
    </div>

    <div class="slider-row">
      <div class="slider-head"><span class="ctl-label">Particles</span><span class="val" id="nVal">320</span></div>
      <input type="range" id="nSlider" min="80" max="560" step="20" value="320">
    </div>

    <div class="slider-row">
      <div class="slider-head"><span class="ctl-label">Average energy</span><span class="val" id="ebarVal">0.98</span></div>
      <input type="range" id="ebarSlider" min="0.08" max="2.88" step="0.02" value="0.98">
    </div>

    <div class="slider-row">
      <div class="slider-head"><span class="ctl-label">Activation energy</span><span class="val" id="actVal">8.00</span></div>
      <input type="range" id="actSlider" min="0" max="19.5" step="0.05" value="8.00" disabled>
    </div>

    <div class="ctl-run">
      <button class="btn btn-run" id="runBtn">Run</button>
      <button class="btn btn-ghost" id="resetBtn">Reset</button>
    </div>
  </div>

</div>

<script>
(() => {
  "use strict";

  // ---------- spectral colour ramp (cool -> hot) ----------
  const STOPS = [
    [0.00, [43, 58,143]],
    [0.20, [47,111,208]],
    [0.40, [40,182,200]],
    [0.55, [63,191,111]],
    [0.70, [216,196, 58]],
    [0.85, [232,137, 58]],
    [1.00, [224, 69, 47]],
  ];
  function ramp(t){
    t = t<0?0:t>1?1:t;
    for(let i=1;i<STOPS.length;i++){
      if(t<=STOPS[i][0]){
        const [a,ca]=STOPS[i-1], [b,cb]=STOPS[i];
        const f=(t-a)/(b-a);
        return [
          Math.round(ca[0]+(cb[0]-ca[0])*f),
          Math.round(ca[1]+(cb[1]-ca[1])*f),
          Math.round(ca[2]+(cb[2]-ca[2])*f),
        ];
      }
    }
    return STOPS[STOPS.length-1][1];
  }
  const rgb = c => `rgb(${c[0]},${c[1]},${c[2]})`;
  // theme-aware token lookup, re-read each call so light/dark toggling
  // (assets/js/theme.js flips [data-theme] on <html>) is picked up live
  const cssVar = name => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

  // ---------- DOM ----------
  const boxCanvas  = document.getElementById('box');
  const histCanvas = document.getElementById('hist');
  const bctx = boxCanvas.getContext('2d');
  const hctx = histCanvas.getContext('2d');

  const el = {
    run: document.getElementById('runBtn'),
    reset: document.getElementById('resetBtn'),
    modeSingle: document.getElementById('modeSingle'),
    modeUniform: document.getElementById('modeUniform'),
    nSlider: document.getElementById('nSlider'),
    nVal: document.getElementById('nVal'),
    ebar: document.getElementById('ebarSlider'),
    ebarVal: document.getElementById('ebarVal'),
    sMean: document.getElementById('sMean'),
    sRms: document.getElementById('sRms'),
    sVp: document.getElementById('sVp'),
    sColl: document.getElementById('sColl'),
    sAct: document.getElementById('sAct'),
    phase: document.getElementById('phaseLabel'),
    curveToggle: document.getElementById('curveToggle'),
    empToggle: document.getElementById('empToggle'),
    actToggle: document.getElementById('actToggle'),
    actSlider: document.getElementById('actSlider'),
    actVal: document.getElementById('actVal'),
    actPctLabel: document.getElementById('actPctLabel'),
  };

  // ---------- world ----------
  const W = 460, H = 460;       // logical box size (square)
  const R = 3.4;                // particle radius
  const NBINS = 32;

  let particles = [];
  let mode = 'single';          // 'single' | 'uniform'
  let running = false;
  let collisions = 0;
  let showCurve = false;         // golden equilibrium curve visibility
  let empiricalOn = false;      // time-averaged empirical curve overlay (off by default)
  let empAcc = new Array(NBINS).fill(0);  // accumulated per-bin counts over frames
  let empFrames = 0;            // number of frames accumulated
  let dpr = Math.min(window.devicePixelRatio || 1, 2);
  let activationOn = false;     // activation-energy threshold visibility
  let Ea = +el.actSlider.value; // activation energy, in the same energy units as ½v²

  // ---------- fixed, absolute histogram axes ----------
  // Both axes are calibrated once from the slider ranges (not from whatever
  // the current run happens to look like), so the plot is a stable frame:
  // changing the average-energy slider shifts the curve along it, and
  // changing the particle count stretches its height, instead of either
  // control just re-normalising the axes to hide the change.
  const EBAR_MAX = +el.ebar.max;            // average-energy slider range
  const SPD_MAX  = Math.sqrt(2*EBAR_MAX);   // equivalent single-mode speed at the top of that range, used to size the axes
  const N_MAX    = +el.nSlider.max;         // particle-count slider range

  // x-axis: wide enough for the broadest MB tail reachable — single-speed
  // start at the highest average energy has mean-square speed 2·Ē, the
  // largest of either mode, so its tail sets the required width.
  const vScale = 2.6 * SPD_MAX;
  const binW0  = vScale / NBINS;

  // Activation energy is set in energy units (E=½v², unit mass) to match
  // chemistry convention, but plotted as its equivalent speed v_a=√(2Eₐ)
  // since this histogram's x-axis is speed. Cap the slider at the energy
  // corresponding to the edge of the visible axis (vScale).
  const EaMax = 0.5*vScale*vScale;
  el.actSlider.max = EaMax.toFixed(2);

  // y-axis: recomputed only on a true reset (init — boot, Reset, mode
  // switch), from the target average energy at that moment, scaled to the
  // largest particle count. That makes the curve fill the available height
  // for whatever setting a run started at, without leaving headroom sized
  // for the single worst case across the whole energy range — but it must
  // NOT be recomputed by live changes (rescaleToEnergy, setParticleCount):
  // holding it fixed between resets is what makes raising the temperature
  // visibly shrink the curve (same particle count, wider spread) and
  // adding particles visibly grow it, rather than the axis chasing either
  // change and hiding it. Mode-invariant: Ē is the true mean of ½v²
  // regardless of the starting spread, so mean-square speed is always 2Ē.
  let yMax = 1;
  function computeYMax(){
    const ms = 2*(+el.ebar.value);
    const peakPdf = Math.sqrt(2/Math.max(ms,1e-6)) * Math.exp(-0.5);
    yMax = N_MAX * binW0 * peakPdf * 1.3;
  }

  function resetEmp(){ empAcc.fill(0); empFrames = 0; }

  // ---------- canvas sizing (crisp) ----------
  // Locked-aspect canvases (the particle box) keep a fixed logical shape and
  // scale uniformly to whatever width they're given. The histogram instead
  // fills whatever box its flex container actually gives it — including the
  // full height, not just an aspect-locked slice of it — so histW/histH
  // (read by drawHist) are updated to match on every resize.
  function sizeCanvas(canvas, ctx, cssW, cssH){
    canvas.style.aspectRatio = (cssW/cssH).toString();
    const w = canvas.clientWidth || cssW;
    const h = w * cssH/cssW;
    canvas.width  = Math.round(w*dpr);
    canvas.height = Math.round(h*dpr);
    ctx.setTransform(dpr*w/cssW,0,0,dpr*h/cssH,0,0); // scale logical->css->device
  }
  let histW = 550, histH = 320;
  function sizeHistCanvas(canvas, ctx){
    const wrap = canvas.parentElement;
    histW = Math.max(200, wrap.clientWidth || 550);
    histH = Math.max(120, wrap.clientHeight || 320);
    canvas.width  = Math.round(histW*dpr);
    canvas.height = Math.round(histH*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  function resizeAll(){
    sizeCanvas(boxCanvas, bctx, W, H);
    sizeHistCanvas(histCanvas, hctx);
  }

  // ---------- initialise particles ----------
  function init(){
    const N = +el.nSlider.value;
    const Ebar = +el.ebar.value;
    // both starting shapes are calibrated to land on the same mean energy Ē:
    // single-speed has ½s²=Ē so s=√(2Ē); uniform spread has ½·(s²/3)=Ē so
    // s=√(6Ē) — different starting shapes, same starting temperature.
    const s = (mode==='single') ? Math.sqrt(2*Ebar) : Math.sqrt(6*Ebar);
    particles = [];
    // place without heavy overlap
    for(let i=0;i<N;i++){
      let x,y,ok,tries=0;
      do{
        x = R + Math.random()*(W-2*R);
        y = R + Math.random()*(H-2*R);
        ok = true;
        for(let j=0;j<particles.length;j++){
          const dx=x-particles[j].x, dy=y-particles[j].y;
          if(dx*dx+dy*dy < (2*R+0.5)*(2*R+0.5)){ ok=false; break; }
        }
        tries++;
      } while(!ok && tries<30);
      const ang = Math.random()*Math.PI*2;
      const speed = (mode==='single') ? s : Math.random()*s;
      particles.push({x,y,vx:Math.cos(ang)*speed,vy:Math.sin(ang)*speed});
    }
    collisions = 0;
    computeYMax();
    resetEmp();   // new run: previous run's time-average no longer applies
    el.phase.textContent = running ? 'running' : (mode==='single'?'single-speed start':'uniform start');
    draw();
  }

  // Live re-temperature: rescale every existing particle's velocity by the
  // same factor so the ensemble's mean energy hits the new target, without
  // resetting positions or pausing the run. This is the same "velocity
  // rescaling thermostat" trick used in molecular-dynamics simulations —
  // it preserves the current distribution's shape (whatever it is at that
  // moment) while uniformly stretching or compressing its scale, so the
  // particle count — and therefore the area under the histogram — never
  // changes.
  function rescaleToEnergy(targetE){
    const n=particles.length;
    if(n===0) return;
    let sumE=0;
    for(const p of particles) sumE += 0.5*(p.vx*p.vx+p.vy*p.vy);
    const currentE = sumE/n;
    if(currentE>1e-9){
      const k=Math.sqrt(targetE/currentE);
      for(const p of particles){ p.vx*=k; p.vy*=k; }
    } else {
      // degenerate case (everyone at rest): no shape to preserve, so just
      // launch particles fresh at the target speed in random directions
      const s=Math.sqrt(2*targetE);
      for(const p of particles){
        const ang=Math.random()*Math.PI*2;
        p.vx=Math.cos(ang)*s; p.vy=Math.sin(ang)*s;
      }
    }
    // yMax is deliberately left alone here: it's calibrated once per reset
    // (see init) and held fixed across live changes, so raising the target
    // energy with N unchanged visibly shortens the curve (same area spread
    // over a wider base) instead of the axis rescaling to hide it.
    resetEmp();   // the equilibrium shape just shifted, so any prior average is stale
  }

  // Live particle count: add or remove particles without resetting the
  // run, so the histogram's height visibly stretches in real time. New
  // particles sample their speed from a random existing particle — joining
  // the *current* distribution rather than the initial condition — with a
  // fresh random direction and position.
  function setParticleCount(N){
    const cur=particles.length;
    if(N>cur){
      for(let i=cur;i<N;i++){
        let x,y,ok,tries=0;
        do{
          x = R + Math.random()*(W-2*R);
          y = R + Math.random()*(H-2*R);
          ok = true;
          for(let j=0;j<particles.length;j++){
            const dx=x-particles[j].x, dy=y-particles[j].y;
            if(dx*dx+dy*dy < (2*R+0.5)*(2*R+0.5)){ ok=false; break; }
          }
          tries++;
        } while(!ok && tries<30);
        const src=particles[(Math.random()*particles.length)|0];
        const speed=Math.hypot(src.vx,src.vy);
        const ang=Math.random()*Math.PI*2;
        particles.push({x,y,vx:Math.cos(ang)*speed,vy:Math.sin(ang)*speed});
      }
    } else if(N<cur){
      particles.length=N;
    }
    resetEmp();   // per-bin counts scale with N, so a stale average would no longer be comparable
  }

  // ---------- physics ----------
  function maxSpeed(){
    let m=0;
    for(const p of particles){ const v=p.vx*p.vx+p.vy*p.vy; if(v>m)m=v; }
    return Math.sqrt(m);
  }

  function integrate(dt){
    for(const p of particles){
      p.x += p.vx*dt; p.y += p.vy*dt;
      if(p.x < R){ p.x=R; p.vx=Math.abs(p.vx); }
      else if(p.x > W-R){ p.x=W-R; p.vx=-Math.abs(p.vx); }
      if(p.y < R){ p.y=R; p.vy=Math.abs(p.vy); }
      else if(p.y > H-R){ p.y=H-R; p.vy=-Math.abs(p.vy); }
    }
    // spatial grid for pair collisions
    const cell = 2*R;
    const cols = Math.ceil(W/cell)+1;
    const grid = new Map();
    for(let i=0;i<particles.length;i++){
      const p=particles[i];
      const cx=(p.x/cell)|0, cy=(p.y/cell)|0;
      const key=cx*100000+cy;
      let arr=grid.get(key); if(!arr){arr=[];grid.set(key,arr);} arr.push(i);
    }
    const d2 = (2*R)*(2*R);
    for(let i=0;i<particles.length;i++){
      const p=particles[i];
      const cx=(p.x/cell)|0, cy=(p.y/cell)|0;
      for(let ox=-1;ox<=1;ox++)for(let oy=-1;oy<=1;oy++){
        const arr=grid.get((cx+ox)*100000+(cy+oy));
        if(!arr) continue;
        for(const j of arr){
          if(j<=i) continue;
          const q=particles[j];
          let dx=q.x-p.x, dy=q.y-p.y;
          const dist2=dx*dx+dy*dy;
          if(dist2>=d2 || dist2===0) continue;
          const dist=Math.sqrt(dist2);
          const nx=dx/dist, ny=dy/dist;
          // relative velocity along normal (approach speed)
          const rvx=p.vx-q.vx, rvy=p.vy-q.vy;
          const a=rvx*nx+rvy*ny;
          if(a>0){ // approaching -> equal-mass elastic: swap normal components
            p.vx-=a*nx; p.vy-=a*ny;
            q.vx+=a*nx; q.vy+=a*ny;
            collisions++;
          }
          // positional separation to kill overlap (energy-neutral)
          const overlap=(2*R-dist)*0.5;
          p.x-=nx*overlap; p.y-=ny*overlap;
          q.x+=nx*overlap; q.y+=ny*overlap;
        }
      }
    }
  }

  function physicsFrame(){
    const T = 2.0;                       // time advanced per visual frame
    const mv = Math.max(maxSpeed(),1e-6);
    const nsub = Math.min(Math.max(Math.ceil(T/((R*0.6)/mv)),1),16);
    const dt = T/nsub;
    for(let k=0;k<nsub;k++) integrate(dt);
  }

  // ---------- stats ----------
  function stats(){
    let sum=0, sumsq=0;
    for(const p of particles){
      const v=Math.hypot(p.vx,p.vy);
      sum+=v; sumsq+=v*v;
    }
    const n=Math.max(particles.length,1);
    const mean=sum/n, ms=sumsq/n, rms=Math.sqrt(ms);
    const vp=Math.sqrt(ms/2);            // 2D most-probable speed
    return {mean,rms,vp,ms};
  }

  // fraction of particles with kinetic energy (½v²) above the activation
  // energy threshold — compared as v² > 2·Eₐ to avoid a sqrt per particle
  function fracAboveEa(){
    const n=particles.length;
    if(n===0) return 0;
    const thresh=2*Ea;
    let c=0;
    for(const p of particles){ if(p.vx*p.vx+p.vy*p.vy > thresh) c++; }
    return c/n;
  }

  // ---------- rendering: particle box ----------
  function drawBox(){
    bctx.clearRect(0,0,W,H);
    bctx.fillStyle='#05070c';
    bctx.fillRect(0,0,W,H);
    // border
    bctx.strokeStyle='#212a35'; bctx.lineWidth=1;
    bctx.strokeRect(.5,.5,W-1,H-1);
    for(const p of particles){
      const v=Math.hypot(p.vx,p.vy);
      const c=ramp(v/vScale);
      bctx.beginPath();
      bctx.arc(p.x,p.y,R,0,Math.PI*2);
      bctx.fillStyle=rgb(c);
      bctx.fill();
    }
  }

  // ---------- rendering: histogram ----------
  function drawHist(st, fracAbove){
    const w=histW, h=histH;
    const padL=26, padR=8, padT=14, padB=44;
    const plotW=w-padL-padR, plotH=h-padT-padB;
    hctx.clearRect(0,0,w,h);

    // bins
    const bins=new Array(NBINS).fill(0);
    const binW=vScale/NBINS;
    for(const p of particles){
      const v=Math.hypot(p.vx,p.vy);
      let b=(v/binW)|0; if(b>=NBINS)b=NBINS-1; if(b<0)b=0;
      bins[b]++;
    }
    // accumulate the time-average while the simulation advances
    if(running && empiricalOn){ for(let i=0;i<NBINS;i++) empAcc[i]+=bins[i]; empFrames++; }
    const n=Math.max(particles.length,1);
    // raw per-bin counts (not normalised by n) so bar height scales with
    // the particle count instead of always integrating to 1
    const dens=bins;
    const ms=st.ms||1e-6;

    const X = v => padL + (v/vScale)*plotW;
    const Y = d => padT + plotH - (d/yMax)*plotH;

    // axes: x baseline + a visible y spine, drawn as one L-shaped stroke
    hctx.strokeStyle='#212a35'; hctx.lineWidth=1;
    hctx.beginPath();
    hctx.moveTo(padL+.5,padT);
    hctx.lineTo(padL+.5,padT+plotH+.5);
    hctx.lineTo(padL+plotW,padT+plotH+.5);
    hctx.stroke();

    // bars (same spectral ramp per bin)
    for(let i=0;i<NBINS;i++){
      if(dens[i]<=0) continue;
      const x0=X(i*binW), x1=X((i+1)*binW);
      let y=Y(dens[i]); if(y<padT-2)y=padT-2;       // clip tall single-speed spike
      const c=ramp(((i+0.5)*binW)/vScale);
      hctx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},0.82)`;
      hctx.fillRect(x0+0.5, y, Math.max(x1-x0-1,1), padT+plotH-y);
    }

    // theoretical 2D Maxwell-Boltzmann curve, scaled from a probability
    // density to an expected count per bin (N * binW * pdf) to sit on the
    // same absolute count axis as the bars
    if(showCurve){
    hctx.beginPath();
    for(let px=0;px<=plotW;px++){
      const v=(px/plotW)*vScale;
      const f=(2*v/ms)*Math.exp(-v*v/ms);
      const x=padL+px, y=Y(n*binW*f);
      if(px===0)hctx.moveTo(x,y); else hctx.lineTo(x,y);
    }
    hctx.strokeStyle='rgba(232,184,114,0.95)';
    hctx.lineWidth=2;
    hctx.shadowColor='rgba(232,184,114,0.5)'; hctx.shadowBlur=6;
    hctx.stroke();
    hctx.shadowBlur=0;
    }

    // characteristic-energy markers: most probable, mean, rms (labelled to
    // match the "particle energy" axis caption, though the underlying
    // quantity plotted is still speed — see drawHist's x-axis mapping)
    const marks=[
      {v:st.vp,  label:'Eₚ'},
      {v:st.mean,label:'Ē'},
      {v:st.rms, label:'E_rms'},
    ];
    hctx.font='10px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
    hctx.textAlign='center';
    for(const m of marks){
      if(m.v>vScale) continue;
      const x=X(m.v);
      hctx.strokeStyle='rgba(139,150,165,0.45)';
      hctx.setLineDash([3,3]); hctx.lineWidth=1;
      hctx.beginPath(); hctx.moveTo(x,padT+4); hctx.lineTo(x,padT+plotH); hctx.stroke();
      hctx.setLineDash([]);
      hctx.fillStyle='#9aa6b3';
      hctx.fillText(m.label, x, padT+plotH+20);
    }
    // activation-energy threshold: user-movable line + shaded "beyond
    // threshold" region, converted from energy (what the slider sets) to
    // its equivalent speed v_a=√(2Eₐ) since this histogram's x-axis is speed
    if(activationOn){
      const vA=Math.sqrt(2*Ea);
      if(vA<=vScale){
        const x=X(vA);
        const accent=cssVar('--accent');
        hctx.fillStyle=accent; hctx.globalAlpha=0.10;
        hctx.fillRect(x, padT, padL+plotW-x, plotH);
        hctx.globalAlpha=1;
        hctx.strokeStyle=accent; hctx.lineWidth=2;
        hctx.beginPath(); hctx.moveTo(x,padT); hctx.lineTo(x,padT+plotH); hctx.stroke();
        const label=`Eₐ · ${(fracAbove*100).toFixed(1)}% above`;
        hctx.font='10px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
        hctx.fillStyle=accent;
        if(x > padL+plotW*0.6){ hctx.textAlign='right'; hctx.fillText(label, x-5, padT+10); }
        else { hctx.textAlign='left'; hctx.fillText(label, x+5, padT+10); }
      }
    }
    // empirical (time-averaged) distribution — measured data vs the analytical curve
    if(empiricalOn && empFrames>0){
      // average absolute count per bin across accumulated frames — same
      // units as the live bars, so it sits on the same fixed count axis
      const emp = empAcc.map(c => c/empFrames);
      const px = i => X((i+0.5)*binW);
      const py = i => { let y=Y(emp[i]); return y<padT-2?padT-2:y; };
      // faint connecting line
      hctx.beginPath();
      for(let i=0;i<NBINS;i++){ i===0?hctx.moveTo(px(i),py(i)):hctx.lineTo(px(i),py(i)); }
      hctx.strokeStyle=cssVar('--muted'); hctx.globalAlpha=0.5; hctx.lineWidth=1; hctx.stroke(); hctx.globalAlpha=1;
      // data points
      for(let i=0;i<NBINS;i++){
        hctx.beginPath(); hctx.arc(px(i),py(i),2.3,0,Math.PI*2);
        hctx.fillStyle='#eef2f6'; hctx.fill();
        hctx.strokeStyle='#0c0f14'; hctx.lineWidth=0.8; hctx.stroke();
      }
      // goodness of fit vs analytical: overlap = 1 − ½∫|empirical − analytical| dv
      // (compare in pdf-space: convert the absolute-count average back down)
      let tvd=0;
      for(let i=0;i<NBINS;i++){
        const vc=(i+0.5)*binW;
        const ana=(2*vc/ms)*Math.exp(-vc*vc/ms);
        const empPdf=emp[i]/(n*binW);
        tvd += Math.abs(empPdf-ana)*binW;
      }
      const agree=Math.max(0,Math.min(100,(1-0.5*tvd)*100));
      hctx.font='10px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
      hctx.textAlign='right'; hctx.fillStyle='#9fb0bf';
      hctx.fillText(`empirical · ${empFrames} frames · fit ${agree.toFixed(1)}%`, padL+plotW, padT+11);
    }
    // axis titles — deliberately unitless (no tick numbers): this histogram
    // is about shape and relative scale, not literal values
    hctx.fillStyle='#9aa6b3';
    hctx.font='600 12px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
    hctx.textAlign='center';
    hctx.fillText('particle energy →', padL+plotW/2, h-8);

    hctx.save();
    hctx.translate(13, padT+plotH/2);
    hctx.rotate(-Math.PI/2);
    hctx.textAlign='center';
    hctx.fillText('number of particles', 0, 0);
    hctx.restore();
  }

  // ---------- draw + update ----------
  function draw(){
    const st=stats();
    drawBox();
    const fracAbove = activationOn ? fracAboveEa() : 0;
    drawHist(st, fracAbove);
    el.sMean.innerHTML = st.mean.toFixed(2);
    el.sRms.innerHTML  = st.rms.toFixed(2);
    el.sVp.innerHTML   = st.vp.toFixed(2);
    el.sColl.textContent = collisions.toLocaleString();
    el.actPctLabel.textContent = activationOn ? ` · ${(fracAbove*100).toFixed(1)}% above` : '';
    el.sAct.innerHTML = activationOn ? `${(fracAbove*100).toFixed(1)}<small>%</small>` : '—';
  }

  function loop(){
    if(!running) return;
    physicsFrame();
    draw();
    requestAnimationFrame(loop);
  }

  // ---------- controls ----------
  function setRunning(on){
    running=on;
    el.run.textContent = on ? 'Pause' : 'Run';
    el.phase.textContent = on ? 'running' : 'paused';
    if(on) requestAnimationFrame(loop);
  }
  function setMode(m){
    mode=m;
    const single = m==='single';
    el.modeSingle.setAttribute('aria-pressed', single);
    el.modeUniform.setAttribute('aria-pressed', !single);
    setRunning(false);
    init();
  }

  el.run.addEventListener('click', ()=>setRunning(!running));
  el.reset.addEventListener('click', ()=>{ setRunning(false); init(); el.phase.textContent = mode==='single'?'single-speed start':'uniform start'; });
  el.modeSingle.addEventListener('click', ()=>setMode('single'));
  el.modeUniform.addEventListener('click', ()=>setMode('uniform'));
  el.curveToggle.addEventListener('click', ()=>{
    showCurve=!showCurve;
    el.curveToggle.setAttribute('aria-pressed', showCurve);
    if(!running) draw();
  });
  el.empToggle.addEventListener('click', ()=>{
    empiricalOn=!empiricalOn;
    el.empToggle.setAttribute('aria-pressed', empiricalOn);
    resetEmp();                       // start (or clear) the running average fresh
    if(!running) draw();
  });
  el.actToggle.addEventListener('click', ()=>{
    activationOn=!activationOn;
    el.actToggle.setAttribute('aria-pressed', activationOn);
    el.actSlider.disabled = !activationOn;
    if(!running) draw();
  });

  // Both of these act live on the running simulation instead of resetting
  // it: the particle-count slider adds/removes particles in place, and the
  // energy slider rescales existing velocities — see setParticleCount and
  // rescaleToEnergy above.
  el.nSlider.addEventListener('input', ()=>{
    el.nVal.textContent=el.nSlider.value;
    setParticleCount(+el.nSlider.value);
    draw();
  });
  el.ebar.addEventListener('input', ()=>{
    const Ebar = +el.ebar.value;
    el.ebarVal.textContent = Ebar.toFixed(2);
    rescaleToEnergy(Ebar);
    draw();
  });
  el.actSlider.addEventListener('input', ()=>{
    Ea = +el.actSlider.value;
    el.actVal.textContent = Ea.toFixed(2);
    if(!running) draw();
  });

  window.addEventListener('keydown', e=>{
    if(e.code==='Space'){ e.preventDefault(); setRunning(!running); }
    else if(e.key==='r'||e.key==='R'){ setRunning(false); init(); }
    else if(e.key==='c'||e.key==='C'){ el.curveToggle.click(); }
    else if(e.key==='e'||e.key==='E'){ el.empToggle.click(); }
    else if(e.key==='a'||e.key==='A'){ el.actToggle.click(); }
  });

  let rt;
  window.addEventListener('resize', ()=>{ clearTimeout(rt); rt=setTimeout(()=>{ resizeAll(); draw(); reportHeight(); },120); });

  function reportHeight() {
    const h = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight);
    window.parent.postMessage({ type: 'simHeight', height: h }, '*');
  }

  // ---------- boot ----------
  resizeAll();
  init();
  // Report height after canvases have been sized and painted
  requestAnimationFrame(() => requestAnimationFrame(reportHeight));
})();
</script>
</body>
</html>
