<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diffusion Tube — NH&#8323; + HCl</title>
<link rel="stylesheet" href="../assets/css/theme.css">
<script src="../assets/js/theme.js"></script>
<style>
  :root{
    --radius:6px;
    --mono: ui-monospace, "Cascadia Code", "Fira Code", Consolas, monospace;
    --nh3:#5ba3e6; --hcl:#e0716f; --ring:#4fb99e; --expected:#8b5cf6;
  }
  /* Species label colours are hand-tuned per theme so the canvas text
     (and the matching stat readouts below) stay legible against the
     canvas background, which now follows the page theme. */
  :root[data-theme="light"]{
    --nh3:#1f6fb8; --hcl:#b8453d; --ring:#1f8f73; --expected:#6d3fd1;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text); font-family:var(--font);
    -webkit-font-smoothing:antialiased; padding:16px; line-height:1.45;
  }
  .wrap{max-width:1180px;margin:0 auto}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:12px}
  canvas{display:block;width:100%;height:auto;border-radius:3px;background:var(--raised)}

  .legend{display:flex;gap:16px;margin-top:10px;font-size:12.5px;color:var(--muted);align-items:center;flex-wrap:wrap}
  .ldot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
  .lline{width:11px;height:2px;display:inline-block;margin-right:4px;vertical-align:middle}
  .lline.dashed{background:transparent!important;border-top:2px dashed var(--expected)}
  .legend-toggle{cursor:pointer;user-select:none;padding:2px 5px;margin:-2px -5px;border-radius:3px;opacity:.5;transition:opacity .15s,background .15s}
  .legend-toggle:hover{background:var(--raised)}
  .legend-toggle.on{opacity:1}
  .legend-toggle:focus-visible{outline:2px solid var(--accent);outline-offset:1px}

  .controls{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:12px 14px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px 20px;margin-bottom:12px;
  }
  @media(max-width:720px){.controls{grid-template-columns:1fr 1fr}}
  @media(max-width:420px){.controls{grid-template-columns:1fr}}
  .ctrl-row{display:flex;flex-direction:column;justify-content:center;gap:7px}
  .ctrl-row .head{display:flex;justify-content:space-between;align-items:baseline}
  .ctrl-row label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-dim)}
  .ctrl-row .val{font-family:var(--mono);font-size:12px;color:var(--text)}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;background:var(--border);border-radius:99px;outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);box-shadow:0 0 0 1px var(--accent);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);box-shadow:0 0 0 1px var(--accent);cursor:pointer}

  .btn{
    font-family:var(--mono);font-size:12.5px;font-weight:500;letter-spacing:.03em;
    padding:8px 14px;border-radius:4px;cursor:pointer;
    background:var(--raised);color:var(--text);border:1px solid var(--border);
    transition:background .15s,border-color .15s,color .15s;
  }
  .btn:hover{border-color:var(--muted-dim)}
  .btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  .btn.primary:hover{background:var(--gold)}
  .btn.toggle.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .btn-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .status-txt{font-family:var(--mono);font-size:12px;color:var(--muted);flex:1;text-align:right}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border-soft);border:1px solid var(--border-soft);border-radius:4px;overflow:hidden}
  @media(max-width:520px){.stats{grid-template-columns:1fr}}
  .stat{background:var(--raised);padding:9px 12px}
  .stat-label{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-dim);margin-bottom:4px}
  .stat-val{font-family:var(--mono);font-size:14.5px;font-weight:500;color:var(--text)}
</style>
</head>
<body>
<div class="wrap">

  <div class="card">
    <canvas id="c"></canvas>
    <div class="legend">
      <span><span class="ldot" style="background:#378ADD"></span>NH&#8323;</span>
      <span><span class="ldot" style="background:#E24B4A"></span>HCl</span>
      <span><span class="ldot" style="background:var(--text);border:1.5px solid var(--muted-dim);"></span>NH&#8324;Cl</span>
      <span class="legend-toggle" id="legendAir" role="button" tabindex="0" aria-pressed="false" onclick="toggleAir()"><span class="ldot" style="background:rgba(136,135,128,0.5)"></span>Air (N&#8322;/O&#8322;)</span>
      <span class="legend-toggle on" id="legendMean" role="button" tabindex="0" aria-pressed="true" onclick="toggleMean()"><span class="lline" style="background:#0F6E56"></span>Mean position</span>
      <span class="legend-toggle" id="legendExpected" role="button" tabindex="0" aria-pressed="false" onclick="toggleExpected()"><span class="lline dashed"></span>Expected position</span>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-row">
      <div class="head"><label>NH&#8323; / HCl</label><span class="val" id="nVal">120</span></div>
      <input type="range" id="nSlider" min="20" max="250" step="10" value="120" oninput="onNChange(this.value)">
    </div>
    <div class="ctrl-row">
      <div class="head"><label>Temperature</label><span class="val" id="tVal">300 K</span></div>
      <input type="range" id="tSlider" min="200" max="600" step="10" value="300" oninput="onTChange(this.value)">
    </div>
    <div class="ctrl-row">
      <div class="head"><label>Air density</label><span class="val" id="aVal">1000</span></div>
      <input type="range" id="aSlider" min="0" max="2000" step="50" value="1000" oninput="onAChange(this.value)">
    </div>
  </div>

  <div class="btn-row">
    <button class="btn primary" id="startBtn" onclick="toggle()">Start</button>
    <button class="btn" onclick="reset()">Full reset</button>
    <span class="status-txt" id="statusTxt">Adjust controls, then press Start</span>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">NH&#8323; remaining</div><div class="stat-val" id="sNH3" style="color:var(--nh3)">—</div></div>
    <div class="stat"><div class="stat-label">HCl remaining</div><div class="stat-val" id="sHCl" style="color:var(--hcl)">—</div></div>
    <div class="stat"><div class="stat-label">NH&#8324;Cl mean position</div><div class="stat-val" id="sRingPos" style="color:var(--ring)">—</div></div>
  </div>

</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const TUBE_TOP = 92, TUBE_BOT = 122;
const TUBE_H = TUBE_BOT - TUBE_TOP;
const H = TUBE_BOT + 30;
const PLUG_W = 18;
let dpr = Math.min(window.devicePixelRatio || 1, 2);

// The tube is drawn at whatever width the card actually renders at (not a
// fixed logical width), so the canvas's pixel buffer always matches its
// on-screen size 1:1 (times dpr) — otherwise the browser has to stretch a
// fixed-resolution bitmap to fill the container, which blurs it and
// distorts circles/text horizontally.
let W = 660, WALL_L = 20, WALL_R = W - 20;
function sizeCanvas() {
  W = Math.max(300, Math.round(canvas.clientWidth || 660));
  WALL_L = 20; WALL_R = W - 20;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
sizeCanvas();
const R = 1.8, AIR_R = 1.1;
const NH3_M = 17, HCL_M = 36.5, AIR_M = 29;
const T_REF = 300;
const FONT = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
function getCSS(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

// Theoretical ring position: NH3 fraction = v_NH3 / (v_NH3 + v_HCl)
// = sqrt(HCL_M) / (sqrt(NH3_M) + sqrt(HCL_M))
const THEORY_FRAC = Math.sqrt(HCL_M) / (Math.sqrt(NH3_M) + Math.sqrt(HCL_M));

let particles = [], airParticles = [], products = [];
let running = false, raf = null, reacted = 0, frameCount = 0;
let nEach = 120, tempK = 300, airCount = 1000;
let airVisible = false, expectedVisible = false, meanVisible = true;

function speedFor(mass, T) {
  return 1.15 * Math.sqrt(T / T_REF) * Math.sqrt(NH3_M / mass) * 1.6;
}

function newParticle(type) {
  const innerL = WALL_L + PLUG_W, innerR = WALL_R - PLUG_W;
  const spawnZone = Math.min(80, (innerR - innerL) * 0.18);
  const isNH3 = type === 'NH3';
  const mass = isNH3 ? NH3_M : HCL_M;
  const spd = speedFor(mass, tempK) * (0.85 + Math.random() * 0.3);
  const ang = Math.random() * 2 * Math.PI;
  return {
    x: isNH3 ? innerL + R + Math.random() * spawnZone
              : innerR - R - Math.random() * spawnZone,
    y: TUBE_TOP + R + Math.random() * (TUBE_H - 2*R),
    vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
    mass, type, alive: true
  };
}

function newAir() {
  const innerL = WALL_L + PLUG_W, innerR = WALL_R - PLUG_W;
  const spd = speedFor(AIR_M, tempK) * (0.85 + Math.random() * 0.3);
  const ang = Math.random() * 2 * Math.PI;
  return {
    x: innerL + AIR_R + Math.random() * (innerR - innerL - 2*AIR_R),
    y: TUBE_TOP + AIR_R + Math.random() * (TUBE_H - 2*AIR_R),
    vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
    mass: AIR_M
  };
}

function makeParticles() {
  particles = []; airParticles = []; products = []; reacted = 0;
  for (let i = 0; i < nEach; i++) particles.push(newParticle('NH3'));
  for (let i = 0; i < nEach; i++) particles.push(newParticle('HCl'));
  for (let i = 0; i < airCount; i++) airParticles.push(newAir());
}

function setNH3HClCount(target) {
  nEach = target;
  let nh3 = particles.filter(p => p.alive && p.type === 'NH3');
  let hcl = particles.filter(p => p.alive && p.type === 'HCl');
  particles = particles.filter(p => p.alive);
  while (nh3.length < target) { const np = newParticle('NH3'); particles.push(np); nh3.push(np); }
  while (nh3.length > target) { const r = nh3.pop(); particles.splice(particles.indexOf(r), 1); }
  while (hcl.length < target) { const np = newParticle('HCl'); particles.push(np); hcl.push(np); }
  while (hcl.length > target) { const r = hcl.pop(); particles.splice(particles.indexOf(r), 1); }
}

function setAirCount(target) {
  airCount = target;
  while (airParticles.length < target) airParticles.push(newAir());
  while (airParticles.length > target) airParticles.pop();
}

function theoreticalX() {
  const innerL = WALL_L + PLUG_W, innerR = WALL_R - PLUG_W;
  return innerL + THEORY_FRAC * (innerR - innerL);
}

function drawTube() {
  ctx.clearRect(0, 0, W, H);
  const warm = Math.max(0, Math.min(1, (tempK - 200) / 400));
  const r = Math.round(200 + warm*55), g = Math.round(220 - warm*80), b = Math.round(255 - warm*120);
  ctx.fillStyle = `rgba(${r},${g},${b},0.07)`;
  ctx.fillRect(WALL_L, TUBE_TOP, WALL_R - WALL_L, TUBE_H);
  ctx.strokeStyle = getCSS('--border');
  ctx.lineWidth = 1.2;
  ctx.strokeRect(WALL_L, TUBE_TOP, WALL_R - WALL_L, TUBE_H);
  ctx.fillStyle = 'rgba(55,138,221,0.15)';
  ctx.fillRect(WALL_L, TUBE_TOP, PLUG_W, TUBE_H);
  ctx.fillStyle = 'rgba(226,75,74,0.15)';
  ctx.fillRect(WALL_R - PLUG_W, TUBE_TOP, PLUG_W, TUBE_H);
  ctx.font = `500 10px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.fillStyle = getCSS('--nh3'); ctx.fillText('NH₃', WALL_L + PLUG_W/2, TUBE_TOP - 8);
  ctx.fillStyle = getCSS('--hcl'); ctx.fillText('HCl', WALL_R - PLUG_W/2, TUBE_TOP - 8);
  ctx.font = `10px ${FONT}`;
  ctx.fillStyle = getCSS('--muted-dim');
  ctx.textAlign = 'left';   ctx.fillText('0', WALL_L + PLUG_W + 4, TUBE_BOT + 16);
  ctx.textAlign = 'center'; ctx.fillText('50 cm', (WALL_L+WALL_R)/2, TUBE_BOT + 16);
  ctx.textAlign = 'right';  ctx.fillText('100 cm', WALL_R - PLUG_W - 4, TUBE_BOT + 16);
}

function drawExpectedMarker() {
  if (!expectedVisible) return;
  const tx = theoreticalX();
  ctx.save();
  ctx.strokeStyle = getCSS('--expected');
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 3]);
  ctx.beginPath(); ctx.moveTo(tx, TUBE_TOP - 4); ctx.lineTo(tx, TUBE_BOT + 4); ctx.stroke();
  ctx.setLineDash([]);
  // label
  ctx.font = `9px ${FONT}`;
  ctx.fillStyle = getCSS('--expected');
  ctx.textAlign = 'center';
  ctx.fillText('expected', tx, TUBE_TOP - 14);
  ctx.fillText(`(${Math.round(THEORY_FRAC * 100)}%)`, tx, TUBE_TOP - 5);
  ctx.restore();
}

function meanRingX() {
  if (products.length === 0) return null;
  return products.reduce((a,p) => a + p.x, 0) / products.length;
}

function drawMeanMarker() {
  if (!meanVisible) return;
  const mx = meanRingX();
  if (mx === null) return;
  ctx.save();
  ctx.strokeStyle = '#0F6E56';
  ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.moveTo(mx, TUBE_TOP - 4); ctx.lineTo(mx, TUBE_BOT + 4); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(mx - 5, TUBE_TOP - 4); ctx.lineTo(mx + 5, TUBE_TOP - 4); ctx.lineTo(mx, TUBE_TOP + 2);
  ctx.closePath(); ctx.fillStyle = '#0F6E56'; ctx.fill();
  ctx.restore();
}

function drawParticles() {
  if (airVisible) {
    for (const a of airParticles) {
      ctx.beginPath(); ctx.arc(a.x, a.y, AIR_R, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(136,135,128,0.35)'; ctx.fill();
    }
  }
  for (const pr of products) {
    ctx.beginPath(); ctx.arc(pr.x, pr.y, R + 0.4, 0, Math.PI*2);
    ctx.fillStyle = getCSS('--text'); ctx.fill();
    ctx.strokeStyle = 'rgba(136,135,128,0.6)'; ctx.lineWidth = 0.5; ctx.stroke();
  }
  for (const p of particles) {
    if (!p.alive) continue;
    ctx.beginPath(); ctx.arc(p.x, p.y, R, 0, Math.PI*2);
    ctx.fillStyle = p.type === 'NH3' ? 'rgba(55,138,221,0.85)' : 'rgba(226,75,74,0.85)';
    ctx.fill();
  }
  drawExpectedMarker();
  drawMeanMarker();
}

function bounceWalls(p, rad) {
  const innerL = WALL_L + PLUG_W, innerR = WALL_R - PLUG_W;
  if (p.x - rad < innerL) { p.x = innerL + rad; p.vx =  Math.abs(p.vx); }
  if (p.x + rad > innerR) { p.x = innerR - rad; p.vx = -Math.abs(p.vx); }
  if (p.y - rad < TUBE_TOP) { p.y = TUBE_TOP + rad; p.vy =  Math.abs(p.vy); }
  if (p.y + rad > TUBE_BOT) { p.y = TUBE_BOT - rad; p.vy = -Math.abs(p.vy); }
}

function elasticCollide(a, b, ra, rb) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const dist = Math.hypot(dx, dy);
  const minDist = ra + rb;
  if (dist === 0 || dist >= minDist) return;
  const nx = dx / dist, ny = dy / dist;
  const overlap = (minDist - dist) / 2;
  a.x -= nx * overlap; a.y -= ny * overlap;
  b.x += nx * overlap; b.y += ny * overlap;
  const dvx = a.vx - b.vx, dvy = a.vy - b.vy;
  const relNorm = dvx * nx + dvy * ny;
  if (relNorm < 0) return;
  const impulse = (2 * relNorm) / (a.mass + b.mass);
  a.vx -= impulse * b.mass * nx; a.vy -= impulse * b.mass * ny;
  b.vx += impulse * a.mass * nx; b.vy += impulse * a.mass * ny;
}

const CELL = Math.max(R * 2.4, AIR_R * 2) * 1.05;
let grid = new Map();
let idCounter = 0;

function cellKey(cx, cy) { return (cx & 0xFFFF) << 16 | (cy & 0xFFFF); }

function buildGrid(all) {
  grid = new Map();
  for (const p of all) {
    if (p.__id === undefined) p.__id = idCounter++;
    const cx = Math.floor(p.x / CELL), cy = Math.floor(p.y / CELL);
    const key = cellKey(cx, cy);
    let b = grid.get(key); if (!b) { b = []; grid.set(key, b); }
    b.push(p);
  }
}

function forEachNearbyPair(cb) {
  for (const [key, bucket] of grid) {
    const cx = (key >> 16) & 0xFFFF, cy = key & 0xFFFF;
    for (let i = 0; i < bucket.length; i++) {
      for (let j = i+1; j < bucket.length; j++) cb(bucket[i], bucket[j]);
      for (const [ddx, ddy] of [[1,0],[0,1],[1,1],[-1,1]]) {
        const nb = grid.get(cellKey(cx+ddx, cy+ddy));
        if (!nb) continue;
        for (const q of nb) cb(bucket[i], q);
      }
    }
  }
}

function step() {
  for (const p of particles) {
    if (!p.alive) continue;
    p.x += p.vx; p.y += p.vy; bounceWalls(p, R);
  }
  for (const a of airParticles) {
    a.x += a.vx; a.y += a.vy; bounceWalls(a, AIR_R);
  }
  const allMobile = particles.filter(p => p.alive).concat(airParticles);
  buildGrid(allMobile);
  forEachNearbyPair((p, q) => {
    elasticCollide(p, q, p.type ? R : AIR_R, q.type ? R : AIR_R);
  });
  forEachNearbyPair((p, q) => {
    let a, b;
    if      (p.type === 'NH3' && q.type === 'HCl') { a = p; b = q; }
    else if (p.type === 'HCl' && q.type === 'NH3') { a = q; b = p; }
    else return;
    if (!a.alive || !b.alive) return;
    const dx = a.x - b.x, dy = a.y - b.y;
    if (dx*dx + dy*dy < (R*2.4)*(R*2.4)) {
      products.push({ x: (a.x+b.x)/2, y: (a.y+b.y)/2 });
      a.alive = false; b.alive = false; reacted++;
    }
  });
}

function updateStats() {
  const nh3 = particles.filter(p=>p.alive&&p.type==='NH3').length;
  const hcl = particles.filter(p=>p.alive&&p.type==='HCl').length;
  document.getElementById('sNH3').textContent = nh3;
  document.getElementById('sHCl').textContent = hcl;
  const mx = meanRingX();
  if (mx !== null) {
    const innerL = WALL_L + PLUG_W, innerR = WALL_R - PLUG_W;
    const pct = Math.round(((mx - innerL) / (innerR - innerL)) * 100);
    document.getElementById('sRingPos').textContent = pct + '% from NH₃ end';
  } else {
    document.getElementById('sRingPos').textContent = '—';
  }
  if (nh3 === 0 && hcl === 0 && nEach > 0) {
    document.getElementById('statusTxt').textContent = `All molecules reacted · ${reacted} NH₄Cl formed`;
    stop(); return;
  }
  document.getElementById('statusTxt').textContent = `NH₄Cl formed: ${reacted}`;
}

function loop() {
  const total = nEach * 2 + airCount;
  const spf = total > 600 ? 1 : total > 300 ? 2 : 3;
  for (let i = 0; i < spf; i++) step();
  drawTube(); drawParticles();
  frameCount++;
  if (frameCount % 6 === 0) updateStats();
  raf = requestAnimationFrame(loop);
}

function toggle() { running ? stop() : start(); }
function start() {
  running = true;
  document.getElementById('startBtn').textContent = 'Pause';
  raf = requestAnimationFrame(loop);
}
function stop() {
  running = false; cancelAnimationFrame(raf);
  document.getElementById('startBtn').textContent = products.length > 0 ? 'Resume' : 'Start';
}
function reset() {
  stop();
  nEach    = parseInt(document.getElementById('nSlider').value);
  tempK    = parseInt(document.getElementById('tSlider').value);
  airCount = parseInt(document.getElementById('aSlider').value);
  makeParticles();
  document.getElementById('startBtn').textContent = 'Start';
  document.getElementById('statusTxt').textContent = 'Adjust controls, then press Start';
  document.getElementById('sNH3').textContent = '—';
  document.getElementById('sHCl').textContent = '—';
  document.getElementById('sRingPos').textContent = '—';
  drawTube(); drawParticles(); frameCount = 0;
}
function onNChange(v) {
  document.getElementById('nVal').textContent = v;
  setNH3HClCount(parseInt(v));
  if (!running) { drawTube(); drawParticles(); }
}
function onAChange(v) {
  document.getElementById('aVal').textContent = v;
  setAirCount(parseInt(v));
  if (!running) { drawTube(); drawParticles(); }
}
function onTChange(v) {
  document.getElementById('tVal').textContent = v + ' K';
  const newT = parseInt(v), factor = Math.sqrt(newT / tempK);
  tempK = newT;
  for (const p of particles) { if (!p.alive) continue; p.vx *= factor; p.vy *= factor; }
  for (const a of airParticles) { a.vx *= factor; a.vy *= factor; }
  if (!running) { drawTube(); drawParticles(); }
}
function setLegendState(id, on) {
  const el = document.getElementById(id);
  el.classList.toggle('on', on);
  el.setAttribute('aria-pressed', on ? 'true' : 'false');
}
function toggleAir() {
  airVisible = !airVisible;
  setLegendState('legendAir', airVisible);
  if (!running) { drawTube(); drawParticles(); }
}
function toggleExpected() {
  expectedVisible = !expectedVisible;
  setLegendState('legendExpected', expectedVisible);
  if (!running) { drawTube(); drawParticles(); }
}
function toggleMean() {
  meanVisible = !meanVisible;
  setLegendState('legendMean', meanVisible);
  if (!running) { drawTube(); drawParticles(); }
}
for (const id of ['legendAir', 'legendMean', 'legendExpected']) {
  document.getElementById(id).addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); document.getElementById(id).click(); }
  });
}

// Particle x-positions and speeds are stored in tube pixel-space, so when
// the tube's pixel width changes (container resize) both need remapping
// onto the new width to keep each particle's relative position and speed
// the same, rather than bunching up or clipping through the new walls.
function rescaleToWidth(oldInnerL, oldInnerR, newInnerL, newInnerR) {
  const oldSpan = oldInnerR - oldInnerL, newSpan = newInnerR - newInnerL;
  const k = oldSpan > 0 ? newSpan / oldSpan : 1;
  for (const p of particles) { p.x = newInnerL + (p.x - oldInnerL) * k; p.vx *= k; }
  for (const a of airParticles) { a.x = newInnerL + (a.x - oldInnerL) * k; a.vx *= k; }
  for (const pr of products) { pr.x = newInnerL + (pr.x - oldInnerL) * k; }
}

function reportHeight() {
  const h = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight);
  window.parent.postMessage({ type: 'simHeight', height: h }, '*');
}
let rT;
window.addEventListener('resize', () => {
  clearTimeout(rT);
  rT = setTimeout(() => {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const oldInnerL = WALL_L + PLUG_W, oldInnerR = WALL_R - PLUG_W;
    sizeCanvas();
    const newInnerL = WALL_L + PLUG_W, newInnerR = WALL_R - PLUG_W;
    rescaleToWidth(oldInnerL, oldInnerR, newInnerL, newInnerR);
    if (!running) { drawTube(); drawParticles(); }
    reportHeight();
  }, 120);
});

makeParticles();
drawTube();
drawParticles();
requestAnimationFrame(() => requestAnimationFrame(reportHeight));
</script>
