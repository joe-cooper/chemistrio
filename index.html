<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chemistr.io</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<link rel="stylesheet" href="assets/css/site.css?version=2024-06-05">
<script src="assets/js/theme.js?v=f516d968"></script>
</head>
<body>

<header class="site">
  <div class="wrap nav">
    <div class="brand" onclick="go('home')">
      <span class="mark">chemistr.io</span>
    </div>
    <nav class="nav-links" id="navLinks"></nav>
    <button class="menu-btn" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<main class="wrap">

  <!-- Ordinary content pages (home, simulations, resources, ...) are
       fetched from pages/<id>.html and mounted here. See PAGES in
       assets/js/app.js. -->
  <div class="page active" id="pageMount"></div>

  <!-- SIMULATION VIEWER -->
  <section class="viewer" id="page-viewer">
    <div class="viewer-bar">
      <button class="back-link" onclick="go('sims')">&larr; Back to simulations</button>
      <span class="vtitle" id="viewerTitle"></span>
      <button class="fullscreen-btn" id="fullscreenBtn" onclick="toggleFullscreen()">
        <svg id="fsIcon" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M1 5V1h4M9 1h4v4M13 9v4h-4M5 13H1V9"/>
        </svg>
        <span id="fsLabel">Full screen</span>
      </button>
    </div>
    <div class="viewer-layout">
      <div class="viewer-frame" id="viewerFrame"></div>
      <aside class="notes-sidebar" id="notesSidebar">
        <button class="notes-toggle" id="notesToggle" onclick="toggleNotes()" aria-expanded="false" aria-controls="notesContent">
          <span class="notes-toggle-arrow">&#9664;</span>
          <span class="notes-toggle-label">Teaching notes</span>
        </button>
        <div class="notes-body" id="notesBody">
          <div class="notes-content prose" id="notesContent"></div>
        </div>
      </aside>
    </div>
  </section>

</main>

<footer class="site">
  <div class="wrap">
    <span></span>
    <nav class="footer-links">
      <a href="#about/contact">Get in touch</a>
      <a href="#about/support">Donate</a>
      <a href="#about/privacy">Privacy</a>
      <a href="#about/license">License</a>
    </nav>
  </div>
</footer>

<script src="assets/js/data.js?v=874fde01"></script>
<script src="assets/js/app.js?v=e362ec54"></script>
</body>
</html>
